    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/Geist-Variable.woff2"
      crossorigin
    />

    <script>
      // Apply the saved theme before React mounts so the first paint is correct
      // (no FOUC). Default is dark (matches index.html's hardcoded data-theme);
      // honor the user's last choice if set, otherwise honor prefers-color-scheme.
      (function () {
        try {
          var stored = localStorage.getItem("portfolio:theme");
          var theme;
          if (stored === "light" || stored === "dark") {
            theme = stored;
          } else {
            theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
